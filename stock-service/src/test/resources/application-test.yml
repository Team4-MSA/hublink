spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:stock_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

eureka:
  client:
    enabled: false

swagger:
  gateway-url: http://localhost:19091
