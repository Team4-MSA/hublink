spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:slack_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    enabled: false

slack:
  bot-token: xoxb-test-token

swagger:
  gateway-url: http://localhost:19091
