services:

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: order-service-kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'

      KAFKA_LISTENERS: 'INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'INSIDE://kafka:29092,OUTSIDE://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INSIDE'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_READONLY: "false"
    depends_on:
      - kafka

  # ── 인프라 ──────────────────────────────────────────────
  # DB는 RDS 사용 (postgres 컨테이너 불필요)

  redis:
    image: redis:7.2
    container_name: hublink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MSA 핵심 인프라 ──────────────────────────────────────
  eureka-server:
    image: ${ECR_REGISTRY}/hublink-eureka-server:${IMAGE_TAG:-latest}
    container_name: hublink-eureka-server
    env_file:
      - .env
    ports:
      - "19090:19090"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19090/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  config-server:
    image: ${ECR_REGISTRY}/hublink-config-server:${IMAGE_TAG:-latest}
    container_name: hublink-config-server
    ports:
      - "19092:19092"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
    volumes:
      - ./config-repo:/config-repo
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19092/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api-gateway:
    image: ${ECR_REGISTRY}/hublink-api-gateway:${IMAGE_TAG:-latest}
    container_name: hublink-api-gateway
    ports:
      - "19091:19091"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ── 비즈니스 서비스 ──────────────────────────────────────
  user-service:
    image: ${ECR_REGISTRY}/hublink-user-service:${IMAGE_TAG:-latest}
    container_name: hublink-user-service
    expose:
      - "19093"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  order-service:
    image: ${ECR_REGISTRY}/hublink-order-service:${IMAGE_TAG:-latest}
    container_name: hublink-order-service
    expose:
      - "19094"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  hub-service:
    image: ${ECR_REGISTRY}/hublink-hub-service:${IMAGE_TAG:-latest}
    container_name: hublink-hub-service
    expose:
      - "19095"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  company-service:
    image: ${ECR_REGISTRY}/hublink-company-service:${IMAGE_TAG:-latest}
    container_name: hublink-company-service
    expose:
      - "19096"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  product-service:
    image: ${ECR_REGISTRY}/hublink-product-service:${IMAGE_TAG:-latest}
    container_name: hublink-product-service
    expose:
      - "19097"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  stock-service:
    image: ${ECR_REGISTRY}/hublink-stock-service:${IMAGE_TAG:-latest}
    container_name: hublink-stock-service
    expose:
      - "19098"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  delivery-service:
    image: ${ECR_REGISTRY}/hublink-delivery-service:${IMAGE_TAG:-latest}
    container_name: hublink-delivery-service
    expose:
      - "19099"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  slack-service:
    image: ${ECR_REGISTRY}/hublink-slack-service:${IMAGE_TAG:-latest}
    container_name: hublink-slack-service
    expose:
      - "19100"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  ai-service:
    image: ${ECR_REGISTRY}/hublink-ai-service:${IMAGE_TAG:-latest}
    container_name: hublink-ai-service
    expose:
      - "19101"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ── 모니터링 ─────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.6.1
    container_name: hublink-zipkin
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: hublink-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - zipkin

  grafana:
    image: grafana/grafana:13.0.1-security-01
    container_name: hublink-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage:
