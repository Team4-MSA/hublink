spring:
  cloud:
    config:
      enabled: false
  config:
    import: ""
  sql:
    init:
      mode: never

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:user_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

eureka:
  client:
    enabled: false

jwt:
  secret: dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3ItdGVzdGluZy1vbmx5LW11c3QtYmUtMjU2LWJpdHMtbG9uZyEh
  access-expiration: 3600000
  refresh-expiration: 86400000

swagger:
  gateway-url: http://localhost:19091
