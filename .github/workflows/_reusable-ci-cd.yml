name: Reusable CI/CD

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      ECR_REGISTRY:
        required: true
      SERVER_HOST:
        required: true
      SERVER_USER:
        required: true
      SSH_PRIVATE_KEY:
        required: true

# 같은 서비스에 새 push가 오면 이전 실행 취소 (자원 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Push [${{ inputs.service_name }}]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hublink_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build & Test
        run: ./gradlew :${{ inputs.service_name }}:clean :${{ inputs.service_name }}:build
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hublink_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      # develop 브랜치일 때만 이미지 빌드 & ECR 푸시
      # CI에서 만든 JAR를 Docker가 복사만 함 (Gradle 이중 빌드 방지)
      - name: Copy JAR for Docker
        if: github.ref == 'refs/heads/develop'
        run: |
          find ./${{ inputs.service_name }}/build/libs/ \
            -name "*.jar" ! -name "*plain.jar" \
            -exec cp {} ./app.jar \;

      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/develop'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/develop'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build & Push to ECR
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cd
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/hublink-${{ inputs.service_name }}:latest
            ${{ secrets.ECR_REGISTRY }}/hublink-${{ inputs.service_name }}:${{ github.sha }}

  cd:
    name: Deploy [${{ inputs.service_name }}]
    needs: ci
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/hublink/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # AWS 자격증명도 서버에 전달 (ECR 로그인에 필요)
          envs: SERVICE=${{ inputs.service_name }},ECR_REGISTRY=${{ secrets.ECR_REGISTRY }},AWS_REGION=${{ secrets.AWS_REGION }},AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }},AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          script: |
            cd ~/hublink

            # ECR 로그인
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # 새 이미지 Pull 후 해당 서비스만 재시작
            docker pull $ECR_REGISTRY/hublink-$SERVICE:latest
            ECR_REGISTRY=$ECR_REGISTRY docker compose up -d --no-deps $SERVICE

            # 오래된 이미지 정리
            docker image prune -f
