name: core-common (전체 서비스 빌드)
# core-common 변경 시 의존하는 9개 서비스를 모두 병렬 빌드/배포
# 단, 각 서비스 workflow의 paths에도 core-common/**이 포함되어 있어 중복 실행됩니다.
# 중복을 피하려면 각 서비스 workflow에서 core-common/** 경로를 제거하세요.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core-common/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core-common/**'

jobs:
  user-service:
    uses: ./.github/workflows/_reusable-ci-cd.yml
    with:
      service_name: user-service
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  order-service:
    uses: ./.github/workflows/_reusable-ci-cd.yml
    with:
      service_name: order-service
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  hub-service:
