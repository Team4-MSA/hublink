server:
  port: 19094

spring:
  application:
    name: order-service
  datasource:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:19090/eureka/}
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always