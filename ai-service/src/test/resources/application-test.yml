spring:
  cloud:
    config:
      enabled: false
  config:
    import: ""
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ai_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

eureka:
  client:
    enabled: false

ai:
  api-url: http://localhost/test
  api-key: test-ai-api-key

swagger:
  gateway-url: http://localhost:19091
