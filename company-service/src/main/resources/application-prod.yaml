spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/testdb}?currentSchema=company_service
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:testuser}
    password: ${DB_PASSWORD:testpass}

  jpa:
    show-sql: false
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false