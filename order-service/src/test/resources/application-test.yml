spring:
  cloud:
    config:
      enabled: false
  config:
    import: ""
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hublink_test}
    username: ${DB_USERNAME:test}
    password: ${DB_PASSWORD:test}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    enabled: false
